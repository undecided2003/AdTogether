name: Publish SDKs

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- Web SDK (npm) ---
  publish-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
      - name: Install dependencies
        run: npm install
        working-directory: sdk/web-sdk
      - name: Build Web SDK
        run: npm run build
        working-directory: sdk/web-sdk
      - name: Publish to npm
        run: npm publish --access public --no-git-checks
        working-directory: sdk/web-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Android SDK (Maven Central) ---
  publish-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" > gpg_key.asc
        working-directory: sdk/android-sdk

      - name: Publish to Maven Central
        run: |
          gradle publishAllPublicationsToMavenCentralRepository \
            -PmavenCentralUsername="${{ secrets.MAVEN_CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" \
            -Psigning.keyId="${{ secrets.SIGNING_KEY_ID }}" \
            -Psigning.password="${{ secrets.SIGNING_PASSWORD }}" \
            -Psigning.secretKeyRingFile="gpg_key.asc" \
            --stacktrace
        working-directory: sdk/android-sdk

  # --- Flutter SDK (pub.dev) ---
  publish-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Publish Flutter SDK
        run: |
          mkdir -p ~/.config/dart
          echo '${{ secrets.PUB_DEV_CREDENTIALS }}' > ~/.config/dart/pub-credentials.json
          dart pub publish -f
        working-directory: sdk/adtogether_sdk

  # --- iOS SDK (SPM) ---
  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test iOS SDK
        run: swift test
        working-directory: sdk/ios-sdk
