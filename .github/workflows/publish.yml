name: Publish SDKs

on:
  push:
    tags:
      - 'v*'

jobs:
  # --- Web SDK (npm) ---
  publish-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm install
        working-directory: sdk/web-sdk
      - name: Build Web SDK
        run: npm run build
        working-directory: sdk/web-sdk
      - name: Publish to npm
        run: npm publish --access public
        working-directory: sdk/web-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Android SDK (Maven Central) ---
  publish-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_PASSWORD

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" > gpg_key.asc
          # Import if needed, but our Gradle uses in-memory PGP
        working-directory: sdk/android-sdk

      - name: Publish to Sonatype
        run: |
          ./gradlew publishReleasePublicationToSonatypeRepository \
            -PossrhUsername="${{ secrets.OSSRH_USERNAME }}" \
            -PossrhPassword="${{ secrets.OSSRH_PASSWORD }}" \
            -PsigningKey="${{ secrets.SIGNING_KEY }}" \
            -PsigningPassword="${{ secrets.SIGNING_PASSWORD }}"
        working-directory: sdk/android-sdk

  # --- Flutter SDK (pub.dev) ---
  publish-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
      - name: Publish Flutter SDK
        run: |
          mkdir -p ~/.config/dart
          echo '${{ secrets.PUB_DEV_CREDENTIALS }}' > ~/.config/dart/pub-credentials.json
          dart pub publish -f
        working-directory: sdk/adtogether_sdk

  # --- iOS SDK (SPM) ---
  # SPM is tag-based, so this job just ensures tests pass on tag
  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test iOS SDK
        run: xcodebuild test -scheme AdTogether -destination 'platform=iOS Simulator,name=iPhone 15'
        working-directory: sdk/ios-sdk
